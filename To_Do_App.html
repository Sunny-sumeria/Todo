<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>

    <link rel="stylesheet" href="to_do_app.css">

</head>

<body>

    <h1>To-Do List</h1>

    <div class="input-section">
        <input type="text" id="itemName" placeholder="Item Name">
        <input type="date" id="itemDate">
        <select id="itemPriority">
            <option value="" disabled selected>Priority</option>
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
        </select>
        <button id="addItemBtn">Add Item</button>
    </div>

    <div>
        <h2>Today’s TodoList</h2>
        <div id="todayList" class="todo-list-container"></div>

        <h2>Future TodoList</h2>
        <div id="futureList" class="todo-list-container"></div>

        <h2>Completed TodoList</h2>
        <div id="completedList" class="todo-list-container"></div>
    </div>

    <script src="to_do_app.js">
        // DOM Elements

    </script>
</body>

</html>
